backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

publish_mode: editorial_workflow

collections:
  - name: "site"
    label: "Website Settings"
    files:
      - label: "Main Content"
        name: "main"
        file: "content/site.json"
        fields:
          - { label: "Business Name", name: "businessName", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }

          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Phone Digits", name: "phoneDigits", widget: "string" }
          - { label: "Text Number", name: "textPhone", widget: "string" }
          - { label: "Text Digits", name: "textDigits", widget: "string" }

          - { label: "Email", name: "email", widget: "string" }
          - { label: "Instagram", name: "instagram", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Booking URL", name: "bookingUrl", widget: "string" }

          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

          - label: "Reviews"
            name: "reviews"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Stars", name: "stars", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }

          - label: "Gallery"
            name: "gallery"
            widget: "list"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Caption", name: "caption", widget: "string" }
