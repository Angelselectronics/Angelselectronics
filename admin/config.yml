backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "site"
    label: "Site Content"
    files:
      - label: "Main Content"
        name: "site"
        file: "content/site.json"
        fields:
          - { label: "Business Name", name: "business_name", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Booking URL", name: "booking_url", widget: "string" }
          - { label: "Gallery", name: "gallery", widget: "list", field: {label: Image, name: image, widget: image} }
